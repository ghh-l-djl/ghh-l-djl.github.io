<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support Hazel</title>
  <style>
    :root {
      --text: #99876c;
      --muted: #99876c;
      --bg: #faf8f5;
      --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 40rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      margin: 0 0 1.25rem;
      color: var(--text);
    }
    h2 {
      font-size: 0.92rem;
      font-weight: 300;
      color: var(--muted);
      margin: 0 0 0.65rem;
      line-height: 1.55;
    }
    p {
      margin: 1.1rem 0 0.35rem;
      font-weight: 400;
      font-size: 0.88rem;
      color: var(--text);
    }
    img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(44, 36, 25, 0.08);
    }
    .bmc-link {
      display: inline-block;
      margin-top: 1.1rem;
    }
    .bmc-link img {
      height: 50px;
      width: auto;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Support Hazel</h1>
    <section>
      <h2>感谢喜爱和鼓励，您的支持将帮助我持续创作和维护项目。</h2>
      <h2>Thanks for your love and encouragement. Your support helps me keep creating and maintaining projects.</h2>

      <a class="bmc-link" href="https://www.buymeacoffee.com/hazel.g" target="_blank" rel="noopener noreferrer">
        <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me a Coffee" />
      </a>

      <p>WechatPay</p>
      <img src="images/wechat.png" alt="微信收款码" width="250" />
      <p>AliPay</p>
      <img src="images/alipay.png" alt="支付宝收款码" width="250" />
    </section>
  </main>
</body>
</html>
