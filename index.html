<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support Hazel</title>
  <link rel="icon" type="image/svg+xml" href="images/hazel.svg" />
  <style>
    :root {
      --text: #f4f1ed;
      --muted: #a39db0;
      --bg-1: #1c1b22;
      --bg-2: #2a2733;
      --accent-1: #2dd4bf;
      --accent-2: #0ea5a0;
      --accent-text: #06302c;
      --label: #7ee8de;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(45, 212, 191, 0.22);
      --footer: #6f697a;
      --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.65;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(45, 212, 191, 0.18), transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(157, 124, 216, 0.14), transparent 45%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 24rem;
      margin: 0 auto;
      padding: 3rem 1.25rem 3rem;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 0 0 0.65rem;
    }
    .logo {
      width: 2.25rem;
      height: 2.25rem;
      flex-shrink: 0;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin: 0;
      color: var(--text);
    }
    p.thanks {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 0.25rem;
    }
    p.thanks:last-of-type {
      margin-bottom: 1.4rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .support-grid {
      margin-bottom: 1rem;
    }
    .support-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 0.85rem 0.5rem;
      text-decoration: none;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .support-link:hover {
      transform: translateY(-2px);
      border-color: var(--accent-1);
    }
    .support-link .icon {
      width: 1.2rem;
      height: 1.2rem;
      flex-shrink: 0;
    }
    .support-link .label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 0.85rem;
      text-align: center;
    }
    .card .label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--label);
      letter-spacing: 0.02em;
      margin: 0 0 0.6rem;
    }
    .card .qr-frame {
      background: #fdfdfd;
      border-radius: 10px;
      padding: 0.4rem;
    }
    .card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
    }
    footer {
      text-align: center;
      font-size: 0.7rem;
      color: var(--footer);
      margin: 1.5rem 0 0;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <img class="logo" src="images/hazel.svg" alt="" />
      <h1>Support Hazel</h1>
    </div>
    <p class="thanks">感谢喜爱和鼓励，您的支持将帮助我持续创作和维护项目。</p>
    <p class="thanks">Thanks for your love and encouragement. Your support helps me keep creating and maintaining projects.</p>

    <div class="grid support-grid">
      <a class="support-link" href="https://www.buymeacoffee.com/hazel.g" target="_blank" rel="noopener noreferrer" title="Opens buymeacoffee.com in a new tab">
        <img class="icon" src="images/buymeacoffee.svg" alt="" />
        <span class="label">Buy Me a Coffee</span>
      </a>
      <a class="support-link" href="https://ko-fi.com/hazelww" target="_blank" rel="noopener noreferrer" title="Opens ko-fi.com in a new tab">
        <img class="icon" src="images/kofi.svg" alt="" />
        <span class="label">Ko-fi</span>
      </a>
    </div>

    <div class="grid">
      <div class="card">
        <p class="label">WechatPay</p>
        <div class="qr-frame">
          <img src="images/wechat.png" alt="微信收款码" />
        </div>
      </div>
      <div class="card">
        <p class="label">AliPay</p>
        <div class="qr-frame">
          <img src="images/alipay.png" alt="支付宝收款码" />
        </div>
      </div>
    </div>

    <footer>made with ♥ by Hazel</footer>
  </main>
</body>
</html>
